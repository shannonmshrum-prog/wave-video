<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- FULLSCREEN SETUP --- */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

/* Animation wrapper fills viewport */
#wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #f5f2ed;
}

/* Canvas fills container */
#c {
  display: block;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* UI Controls */
.ui {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  gap: 8px;
}

button {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.2);
  color: rgba(0,0,0,0.45);
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  cursor: pointer;
  text-transform: uppercase;
  font-family: monospace;
}

button:hover {
  background: rgba(0,0,0,0.06);
  color: #000;
}
</style>
</head>

<body>

<div id="wrap">
  <canvas id="c"></canvas>

  <div class="ui">
    <button id="colorBtn">+ Neon</button>
    <button id="pauseBtn">Pause</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, t = 0, paused = false, neon = false, animId;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COL_SPACING = 9;
const ROW_SPACING = 9;

function getWaveHeight(x, time) {
  const nx = x / W;
  const w1 = Math.sin(nx * Math.PI * 2.1 + time * 0.00035) * 0.18;
  const w2 = Math.sin(nx * Math.PI * 4.3 + time * 0.00022) * 0.10;
  const w3 = Math.sin(nx * Math.PI * 1.1 - time * 0.00018) * 0.14;
  const w4 = Math.sin(nx * Math.PI * 7.0 + time * 0.00041) * 0.05;
  const base = 0.55;
  return Math.min(1, Math.max(0.05, base + w1 + w2 + w3 + w4));
}

function getDotRadius(colX, rowY, waveTop, time) {
  const distFromWave = rowY - waveTop;
  if (distFromWave < -ROW_SPACING * 3) return 0;

  let density;

  if (distFromWave < 0) {
    density = Math.pow(1 + distFromWave / (ROW_SPACING * 3), 2) * 0.45;
  } else {
    const depthRatio = distFromWave / (H - waveTop);
    density = 0.45 + depthRatio * 0.55;
  }

  const wobble =
    Math.sin(colX * 0.08 + time * 0.0003) * 0.06 +
    Math.sin(rowY * 0.12 + time * 0.00025) * 0.04;

  const maxR = ROW_SPACING * 0.48;
  return Math.max(0, Math.min(maxR, (density + wobble) * maxR));
}

function draw(time) {

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = neon ? '#0a0a0a' : '#f5f2ed';
  ctx.fillRect(0, 0, W, H);

  const cols = Math.ceil(W / COL_SPACING) + 1;
  const rows = Math.ceil(H / ROW_SPACING) + 1;

  for (let ci = 0; ci < cols; ci++) {

    const x = ci * COL_SPACING;
    const waveRatio = getWaveHeight(x, time);
    const waveTop = H * (1 - waveRatio);

    for (let ri = 0; ri < rows; ri++) {

      const y = ri * ROW_SPACING;
      const r = getDotRadius(x, y, waveTop, time);
      if (r < 0.3) continue;

      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);

      const distFromWave = y - waveTop;
      const ratio = Math.min(1, Math.max(0, distFromWave / H));

      if (neon) {
        if (distFromWave < 0) {
          ctx.fillStyle = `rgba(255,20,120,${0.6 + ratio * 0.4})`;
        } else {
          const g = Math.floor(80 + ratio * 175);
          ctx.fillStyle = `rgba(0,${g},80,${0.55 + ratio * 0.45})`;
        }
      } else {
        const alpha =
          distFromWave < 0
            ? 0.3 + (1 + distFromWave / (ROW_SPACING * 3)) * 0.5
            : 0.55 + ratio * 0.45;

        ctx.fillStyle = `rgba(10,10,10,${alpha})`;
      }

      ctx.fill();
    }
  }
}

function frame(ts) {
  if (!paused) t = ts;
  draw(t);
  animId = requestAnimationFrame(frame);
}

animId = requestAnimationFrame(frame);

document.getElementById('pauseBtn').onclick = function () {
  paused = !paused;
  this.textContent = paused ? 'Play' : 'Pause';
};

document.getElementById('colorBtn').onclick = function () {
  neon = !neon;
  this.textContent = neon ? '− Neon' : '+ Neon';
  document.getElementById('wrap').style.background =
    neon ? '#0a0a0a' : '#f5f2ed';
};
</script>

</body>
</html>
